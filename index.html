<title>AitkenTech Apps</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F4F6F5;min-height:100vh;max-width:480px;margin:0 auto}
.header{background:#1A1A2E;padding:52px 24px 28px}

.card-left .title{font-size:19px;font-weight:600;color:#fff}
.card-left .sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px;line-height:1.4}
.arrow{font-size:24px;color:rgba(255,255,255,.3)}
.note{font-size:12px;color:#9BA3AD;text-align:center;margin-top:20px;line-height:1.6}
